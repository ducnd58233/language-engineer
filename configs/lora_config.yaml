model:
  base_model: "Qwen/Qwen2.5-3B-Instruct"
  max_seq_length: 640

quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_use_double_quant: true

lora:
  r: 8
  lora_alpha: 32
  lora_dropout: 0.05
  bias: "none"
  task_type: "CAUSAL_LM"
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    # - gate_proj
    # - up_proj
    # - down_proj

training:
  output_dir: "runs/Qwen2.5-3B-Instruct_qlora"
  num_train_epochs: 10
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 8
  gradient_checkpointing: true
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.03
  weight_decay: 0.01
  bf16: true
  logging_steps: 50
  dataloader_num_workers: 4
  dataloader_pin_memory: true
  eval_strategy: "steps"
  eval_steps: 100
  save_strategy: "steps"
  save_steps: 100
  save_total_limit: 3
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  report_to: "none"

  resume:
    enabled: true
    checkpoint_path: null
    auto_latest: true

data:
  train_parquet: "datasets/processed/train/data.parquet"
  validation_parquet: "datasets/processed/validation/data.parquet"
  test_parquet: "datasets/processed/test/data.parquet"
