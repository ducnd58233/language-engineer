model:
  base_model: "Qwen/Qwen2.5-3B-Instruct"
  max_seq_length: 1024
  min_summary_tokens: 56
  max_summary_tokens: 512

quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_use_double_quant: true

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  bias: "none"
  task_type: "CAUSAL_LM"
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  num_train_epochs: 1
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 4
  gradient_checkpointing: true
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.03
  weight_decay: 0.01
  bf16: true
  optim: "adamw_torch_fused" # "paged_adamw_8bit"
  logging_steps: 50
  packing: false
  dataloader_num_workers: 0
  dataloader_pin_memory: true
  eval_strategy: "steps"
  eval_steps: 100
  save_strategy: "steps" # "no", "epoch", "steps", "best"
  save_steps: 100
  save_total_limit: 3
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  report_to: "none"
  push_to_hub: true
  hub_strategy: "checkpoint"  # "end", "checkpoint", "every_save", "all_checkpoints"
  hub_private_repo: false
  hub_model_id: ducnd58233/qwen2.5-3b-qlora-summarization

  gradient_checkpointing_kwargs: # only when gradient_checkpointing: true
    use_reentrant: false

  resume:
    enabled: true
    checkpoint_path: null
    auto_latest: true

data:
  train_dir: "datasets/processed/train"
  validation_dir: "datasets/processed/validation"
  test_dir: "datasets/processed/test"
  rows_per_shard: 100_000

  # Training partition
  max_rows: 10_000 # null = all rows
  shards: null # null = use shard_offset; list of ints e.g. [1, 3, 2]
  shard_offset: 1 # null = shard 0; int to skip first N shards (ignored when shards is set)
  offset: 1000  # null = no row skip

  # Validation partition
  max_eval_samples: 200 # null = all val rows
  val_shards: null  # null = use val_shard_offset; list of ints e.g. [0]
  val_shard_offset: null # null = shard 0; int to skip first N val shards
  val_offset: null # null = no row skip
